      // Umami Analytics: sadece VITE_ANALYTICS_ENDPOINT env değişkeni build'de
      // yerleştirilmişse yükle. Değişken çözümlenmemişse (%VITE_...% literal

      (function() {
        var endpoint = '%VITE_ANALYTICS_ENDPOINT%';
        var siteId   = '%VITE_ANALYTICS_WEBSITE_ID%';
        if (!endpoint || endpoint.indexOf('%VITE_') === 0) return;
        var s = document.createElement('script');
        s.defer = true;
        s.src = endpoint + '/umami';
        s.setAttribute('data-website-id', siteId);
